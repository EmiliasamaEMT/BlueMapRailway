name: 发布 Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: 构建并发布
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: 设置 Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 计算版本号
        run: echo "PLUGIN_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: 构建插件
        run: ./gradlew build -PpluginVersion="${PLUGIN_VERSION}"

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: BlueMapRailway ${{ env.PLUGIN_VERSION }}
          files: build/libs/BlueMapRailway-${{ env.PLUGIN_VERSION }}.jar
          generate_release_notes: true
