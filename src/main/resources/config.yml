worlds:
  world:
    enabled: true
    scan-radius: -1

markers:
  set-id: railways
  label: Railways
  unclassified-label: Railways - 未分类
  default-hidden: false
  line-width: 5
  y-offset: 0.35
  depth-test-enabled: false
  colors:
    rail: "#9ca3af"
    powered-rail: "#facc15"
    powered-rail-inactive: "#a16207"
    detector-rail: "#ef4444"
    activator-rail: "#38bdf8"

scanner:
  chunks-per-tick: 1
  update-debounce-ticks: 40

cache:
  enabled: true
  file: cache/rail-cache.yml
  scan-newly-loaded-chunks: true
  chunk-load-debounce-ticks: 100

admin-web:
  enabled: false
  host: 127.0.0.1
  port: 8765
  token: change-me
  background:
    image: admin-web/background.png
    world: world
    center-x: 0.0
    center-z: 0.0
    pixels-per-block: 4.0

routes:
  auto-match:
    enabled: true
    anchor-radius: 16.0
    min-bounds-overlap-ratio: 0.35

stations:
  marker-set-label: 站点
  default-radius: 24.0
  default-y-radius: 6
  bounds:
    enabled: true
    color: "#fb7185"
    line-width: 2
    depth-test-enabled: false
  internal-tracks:
    label: 站内轨道
    default-hidden: false

filters:
  hide-short-lines: true
  short-line-max-points: 3
  short-line-max-length: 6.0
  hide-fragmented-plain-rail-below-min-y: true
  min-y: 50
  fragmented-line-max-points: 8
  fragmented-line-max-length: 32.0

export:
  svg:
    enabled: true
    directory: export
    file: railways.svg
    title: BlueMap Railway
    padding: 16.0
    non-scaling-stroke: true

debug:
  render-demo-line: false
