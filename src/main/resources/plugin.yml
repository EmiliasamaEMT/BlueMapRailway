name: BlueMapRailway
version: ${version}
main: io.github.emiliasamaemt.bluemaprailway.BlueMapRailwayPlugin
api-version: "1.21"
authors:
  - EmiliasamaEMT
description: 在 BlueMap 上显示原版铁路网络。
website: https://github.com/EmiliasamaEMT/BlueMapRailway
softdepend:
  - BlueMap
commands:
  railmap:
    description: 管理 BlueMap 铁路覆盖层。
    usage: /railmap <status|debug|log|reload|rescan|route|station>
    permission: bluemaprailway.admin
permissions:
  bluemaprailway.admin:
    description: 允许管理 BlueMap 铁路覆盖层。
    default: op
